name: Bug report
description: Report a bug in Laravel Paper.
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. You can help solve it by filling out the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce the bug?
      description: The smallest model and content file that triggers it, plus the steps you ran.
    validations:
      required: true
  - type: input
    id: paper-version
    attributes:
      label: Laravel Paper version
      placeholder: "1.10.0"
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "8.4"
    validations:
      required: true
  - type: input
    id: laravel-version
    attributes:
      label: Laravel version
      placeholder: "12.3.0"
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Anything else worth knowing. Related issues, or things you have already ruled out.
    validations:
      required: false
